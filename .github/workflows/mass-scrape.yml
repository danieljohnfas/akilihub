name: Mass Scrape Data Extraction

on:
  schedule:
    # Runs at 00:00 every Sunday and Wednesday.
    # This keeps us well under the 2,000 free minutes/month limit for private repos.
    # (If your repo is public, Actions are 100% unlimited and free, and you can run this daily).
    - cron: '0 0 * * 0,3'
  workflow_dispatch: # Allows you to manually trigger the run from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Mass Scrape
        # We pass in all the necessary environment variables from GitHub Secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }} # Renamed to avoid GH Action's default token conflict
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Create a temporary .env.local file for the script to use
          echo "DATABASE_URL=$DATABASE_URL" >> .env.local
          echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env.local
          echo "CEREBRAS_API_KEY=$CEREBRAS_API_KEY" >> .env.local
          echo "MISTRAL_API_KEY=$MISTRAL_API_KEY" >> .env.local
          echo "HF_TOKEN=$HF_TOKEN" >> .env.local
          echo "GITHUB_TOKEN=$GITHUB_TOKEN" >> .env.local
          echo "SAMBANOVA_API_KEY=$SAMBANOVA_API_KEY" >> .env.local
          echo "COHERE_API_KEY=$COHERE_API_KEY" >> .env.local
          echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID" >> .env.local
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> .env.local
          
          # Run the script using tsx just like you do locally
          npx tsx --env-file=.env.local run-mass-scrape.ts
